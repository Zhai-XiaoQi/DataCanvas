<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格整理 Pro - 结构化网页可视化引擎</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    colors: { 
                        darkbg: '#0f172a', 
                        darkcard: '#1e293b', 
                        darkborder: '#334155'
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        ::selection { background-color: rgba(59, 130, 246, 0.25) !important; color: inherit !important; }
        .dark ::selection { background-color: rgba(59, 130, 246, 0.4) !important; color: inherit !important; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        ::-webkit-scrollbar { height: 12px; width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; border: 3px solid #f8fafc; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; border: 3px solid #0f172a; }
        ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background-color: #64748b; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 12px; width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; border: 3px solid #ffffff; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border: 3px solid #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #64748b; }
        
        html { scroll-behavior: smooth; }
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        
        .list-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center; }
        .list-card:hover { transform: translateY(-4px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); }
        .dark .list-card:hover { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); }

        .img-zoom-container .img-controls { opacity: 0; transform: translateY(8px); transition: all 0.2s ease-out; }
        .img-zoom-container:hover .img-controls { opacity: 1; transform: translateY(0); }
        .img-zoom-container .hero-img { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .img-zoom-container:hover .hero-img { transform: scale(1.05); }

        @keyframes fade-up {
            0% { opacity: 0; transform: translateY(8px) translateX(-50%); }
            15% { opacity: 1; transform: translateY(0) translateX(-50%); }
            85% { opacity: 1; transform: translateY(0) translateX(-50%); }
            100% { opacity: 0; transform: translateY(-8px) translateX(-50%); }
        }
        .toast-copy { animation: fade-up 1.5s ease-in-out forwards; }
    </style>
</head>
<body class="bg-[#f8fafc] dark:bg-darkbg min-h-screen text-slate-800 dark:text-slate-200 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const MY_CONFIG = {
            wechatQR: "wechat-qr.jpg",   
            alipayQR: "alipay-qr.jpg",   
            wechatId: "ktsp007（一周宅七天）",       
            email: "1578728963@qq.com", 
            authorName: "[i人小吴]"       
        };

        const { useState, useEffect, useCallback, useRef } = React;

        const Icon = ({ path, size = 20, className = "", viewBox="0 0 24 24", fill="none" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox={viewBox} fill={fill} stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );
        const UploadCloud = (p) => <Icon {...p} path='<path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/>' />;
        const FileSpreadsheet = (p) => <Icon {...p} path='<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h2"/><path d="M14 13h2"/><path d="M8 17h2"/><path d="M14 17h2"/>' />;
        const Search = (p) => <Icon {...p} path='<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>' />;
        const LayoutGrid = (p) => <Icon {...p} path='<rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/>' />;
        const Layers = (p) => <Icon {...p} path='<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/>' />;
        const Eye = (p) => <Icon {...p} path='<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>' />;
        const EyeOff = (p) => <Icon {...p} path='<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>' />;
        const Copy = (p) => <Icon {...p} path='<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>' />;
        const Download = (p) => <Icon {...p} path='<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>' />;
        const CheckCircle = (p) => <Icon {...p} path='<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' />;
        const Trash2 = (p) => <Icon {...p} path='<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>' />;
        const Heart = (p) => <Icon {...p} path='<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>' />;
        const X = (p) => <Icon {...p} path='<path d="M18 6 6 18"/><path d="m6 6 12 12"/>' />;
        const MessageCircle = (p) => <Icon {...p} path='<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>' />;
        const Mail = (p) => <Icon {...p} path='<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>' />;
        const Sun = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>' />;
        const Moon = (p) => <Icon {...p} path='<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>' />;
        const ArrowUp = (p) => <Icon {...p} path='<line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline>' />;
        const Github = (p) => <Icon {...p} path='<path d="M15 22v-4a4.8 4.8 0 0 0-1-3.2c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/>' />;
        const Languages = (p) => <Icon {...p} path='<path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/>' />;

        // 最严图片判定，绝不误杀文案
        const isImageUrl = (url) => {
            if (typeof url !== 'string') return false;
            const trimmed = url.trim();
            if (trimmed.length > 500) return false;
            if (!/^https?:\/\//i.test(trimmed) && !/^data:image/i.test(trimmed) && !/^www\./i.test(trimmed)) {
                return false;
            }
            return /\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i.test(trimmed);
        };

        // 🌟 强力提取内核组件 (由 GPT 提供思路，强制解析富文本层)
        const decodeHtmlText = (html = "") => {
            const div = document.createElement("div");
            div.innerHTML = String(html).replace(/<br\s*\/?>/gi, "\n");
            return (div.textContent || div.innerText || "")
                .replace(/\u00a0/g, " ")
                .replace(/\r\n/g, "\n")
                .trim();
        };

        const decodeRichTextXml = (xml = "") => {
            return String(xml)
                .replace(/<rPh[\s\S]*?<\/rPh>/g, "")
                .replace(/<t[^>]*xml:space=\"preserve\"[^>]*>/g, "")
                .replace(/<t[^>]*>/g, "")
                .replace(/<\/t>/g, "")
                .replace(/<br\s*\/?>/gi, "\n")
                .replace(/&#10;|&#xA;/gi, "\n")
                .replace(/&nbsp;/gi, " ")
                .replace(/&amp;/g, "&")
                .replace(/&lt;/g, "<")
                .replace(/&gt;/g, ">")
                .replace(/&quot;/g, '"')
                .replace(/&#39;/g, "'")
                .replace(/<\/?.*?>/g, "")
                .trim();
        };

        const getCellText = (cell) => {
            if (!cell) return "";

            if (cell.t === 'n' || cell.t === 'd') {
                if (cell.w !== undefined && cell.w !== null && String(cell.w).trim() !== "") return String(cell.w);
                if (cell.v !== undefined && cell.v !== null && String(cell.v).trim() !== "") return String(cell.v);
            }

            if (cell.w !== undefined && cell.w !== null && String(cell.w).trim() !== "") return String(cell.w);
            if (cell.v !== undefined && cell.v !== null && String(cell.v).trim() !== "") return String(cell.v);

            if (typeof cell.h === 'string' && cell.h.trim() !== "") {
                const htmlText = decodeHtmlText(cell.h);
                if (htmlText) return htmlText;
            }

            if (Array.isArray(cell.r)) {
                const richText = cell.r.map(run => run?.t || "").join("").trim();
                if (richText) return richText;
            }

            if (typeof cell.r === 'string' && cell.r.trim() !== "") {
                const richXmlText = decodeRichTextXml(cell.r);
                if (richXmlText) return richXmlText;
            }

            return "";
        };

        const copyToClipboard = (text, callback) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            try { document.execCommand('copy'); if(callback) callback(); } 
            catch (err) { console.error('Copy failed:', err); }
            document.body.removeChild(textArea);
        };

        const downloadFile = (dataUrl, filename) => {
            const a = document.createElement('a');
            a.href = dataUrl; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        };

        const linkify = (str) => {
            if (!str) return "";
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const parts = str.split(urlRegex);
            return parts.map((part, i) => {
                if (part.match(urlRegex)) {
                    return <a key={i} href={part} target="_blank" rel="noreferrer" className="text-blue-600 dark:text-blue-400 hover:underline break-all mx-0.5 relative z-10" onClick={e=>e.stopPropagation()}>{part}</a>;
                }
                return <span key={i}>{part}</span>;
            });
        };

        const CurrencyCopier = () => {
            const [copied, setCopied] = useState(null);
            
            const handleCopy = (sym) => {
                copyToClipboard(sym, () => {
                    setCopied(sym);
                    setTimeout(() => setCopied(null), 1500);
                });
            };
            
            return (
                <div className="flex items-center ml-2 sm:ml-5 space-x-1.5 sm:space-x-2 bg-slate-100/80 dark:bg-white/5 px-2 sm:px-3 py-1.5 rounded-xl border border-slate-200/50 dark:border-white/5 relative">
                    <span className="hidden sm:inline text-[11px] text-slate-400 font-semibold mr-1 select-none">快捷符号:</span>
                    {['$', '€', '£'].map(sym => (
                        <button 
                            key={sym} 
                            onClick={() => handleCopy(sym)} 
                            className="w-6 h-6 sm:w-7 sm:h-7 flex items-center justify-center text-sm font-bold text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 hover:text-blue-600 dark:hover:text-blue-400 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm transition-all hover:shadow active:scale-95"
                            title={`复制 ${sym}`}
                        >
                            {sym}
                        </button>
                    ))}
                    {copied && (
                        <span className="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-[11px] px-2.5 py-1 rounded-md shadow-lg whitespace-nowrap z-50 font-bold animate-in fade-in zoom-in duration-200">
                            已复制 {copied}
                        </span>
                    )}
                </div>
            );
        };

        // 直接用 whitespace-pre-wrap 暴力直出，原汁原味
        const SmartTextContent = ({ text }) => {
            const [copied, setCopied] = useState(false);
            const baseClass = "text-[14px] leading-[1.7] text-slate-700 dark:text-slate-300 font-normal";

            const handleCopy = (e) => {
                if (window.getSelection().toString().length > 0) return; 
                e.stopPropagation(); e.preventDefault();
                copyToClipboard(text, () => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };

            return (
                <div className="mt-2 w-full">
                    <div 
                        onClick={handleCopy}
                        className={`relative group/block bg-slate-50 dark:bg-white/[0.03] px-4 py-3 rounded-xl border border-slate-100 dark:border-darkborder shadow-sm cursor-pointer transition-all hover:border-blue-300 dark:hover:border-blue-500/50 hover:bg-white dark:hover:bg-white/[0.05] ${copied ? 'ring-1 ring-green-500' : ''}`}
                        title="单击复制整段内容 (支持拖拽划选局部文字)"
                    >
                        <div className="absolute right-3 top-3.5 opacity-0 group-hover/block:opacity-100 transition-opacity">
                            {copied ? <CheckCircle size={15} className="text-green-500" /> : <Copy size={15} className="text-slate-400 group-hover/block:text-blue-500" />}
                        </div>
                        {copied && (
                            <span className="absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 dark:bg-white text-white dark:text-slate-900 text-[11px] px-2.5 py-1 rounded shadow-lg flex items-center toast-copy z-20 whitespace-nowrap font-bold">
                                <CheckCircle size={12} className="mr-1" /> 已复制该段
                            </span>
                        )}
                        <div className={`${baseClass} whitespace-pre-wrap pr-8 relative z-10 w-full break-words`}>
                            {linkify(text)}
                        </div>
                    </div>
                </div>
            );
        };

        const FieldBlock = ({ field }) => {
            const [copied, setCopied] = useState(false);
            const [translation, setTranslation] = useState(null);
            const [isTranslating, setIsTranslating] = useState(false);

            const needsTranslation = /[a-zA-Z\u00C0-\u024F\u0400-\u04FF\u3040-\u30FF\uAC00-\uD7AF\u0600-\u06FF]/.test(field.value);

            const handleCopy = (e) => {
                e.stopPropagation();
                copyToClipboard(field.value, () => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };

            const handleTranslate = async (e) => {
                e.stopPropagation();
                if (translation) {
                    setTranslation(null); 
                    return;
                }
                setIsTranslating(true);
                try {
                    const textToTranslate = field.value.substring(0, 1000);
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=zh-CN&dt=t&q=${encodeURIComponent(textToTranslate)}`);
                    const data = await res.json();
                    
                    if (data && data[0]) {
                        const translated = data[0].map(item => item[0]).join('');
                        setTranslation(translated);
                    } else {
                        throw new Error("解析返回数据失败");
                    }
                } catch (err) {
                    console.error("Translation Error:", err);
                    setTranslation("⚠️ 翻译引擎网络受限或连接超时，请稍后再试。");
                } finally {
                    setIsTranslating(false);
                }
            };

            return (
                <div className="relative group/field flex flex-col gap-1.5 w-full overflow-hidden h-full border-b border-slate-100 dark:border-darkborder pb-5 last:border-0 last:pb-0">
                    <div className="flex items-center justify-between">
                        <span className="text-[13px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">
                            {field.colName}
                        </span>
                        
                        <div className="flex space-x-2 transition-opacity">
                            {needsTranslation && (
                                <button
                                    onClick={handleTranslate}
                                    className="px-2 py-1.5 text-slate-400 hover:text-indigo-500 rounded-md hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all flex items-center gap-1 opacity-60 hover:opacity-100"
                                    title={translation ? "关闭翻译" : "一键翻译为中文"}
                                >
                                    {isTranslating ? (
                                        <div className="w-3.5 h-3.5 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                                    ) : (
                                        <Languages size={14} />
                                    )}
                                    <span className="text-[11px] font-bold">译</span>
                                </button>
                            )}
                            
                            <button
                                onClick={handleCopy}
                                className="p-1.5 text-slate-400 hover:text-blue-500 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 transition-all opacity-0 sm:group-hover/field:opacity-100 focus-within:opacity-100"
                                title="一键复制该字段的全部内容"
                            >
                                {copied ? <CheckCircle size={15} className="text-green-500" /> : <Copy size={15} />}
                            </button>
                        </div>
                    </div>
                    
                    <SmartTextContent text={field.value} />

                    {translation && (
                        <div className="mt-3 p-3.5 bg-indigo-50/50 dark:bg-indigo-900/10 border border-indigo-100 dark:border-indigo-800/30 rounded-xl relative animate-in fade-in slide-in-from-top-2">
                            <button onClick={() => setTranslation(null)} className="absolute top-3 right-3 text-indigo-300 hover:text-indigo-500 transition-colors p-1" title="关闭">
                                <X size={14} />
                            </button>
                            <div className="text-xs font-bold text-indigo-500 dark:text-indigo-400 mb-1.5 flex items-center gap-1.5">
                                <Languages size={13}/> 中文翻译参考
                            </div>
                            <div className="text-[13.5px] text-slate-700 dark:text-slate-300 leading-[1.6] whitespace-pre-wrap pr-6">
                                {translation}
                            </div>
                        </div>
                    )}

                    {field.link && !field.value.includes(field.link) && (
                        <a href={field.link} target="_blank" rel="noreferrer" className="text-blue-500 hover:underline text-sm break-all mt-2 inline-block relative z-10 w-fit" onClick={e=>e.stopPropagation()}>
                            🔗 {field.link}
                        </a>
                    )}
                </div>
            );
        };

        const ImageGallery = ({ images, item, onImageClick }) => {
            const total = images.length;
            if (total === 0) return null;

            const renderImg = (img, idx, className, extraCount = 0) => (
                <div 
                    key={idx}
                    onClick={() => onImageClick(img)} 
                    className={`img-zoom-container relative bg-slate-50 dark:bg-[#0f172a] rounded-xl border border-slate-200/60 dark:border-white/5 flex items-center justify-center overflow-hidden cursor-zoom-in shadow-sm p-1.5 ${className}`}
                >
                    <img src={img} className="hero-img object-contain w-full h-full drop-shadow-sm rounded-lg" alt="附图" />
                    
                    {extraCount > 0 && (
                        <div className="absolute inset-0 bg-black/60 flex items-center justify-center text-white font-bold text-2xl backdrop-blur-sm z-20 rounded-xl">
                            +{extraCount}
                        </div>
                    )}
                    
                    {extraCount === 0 && (
                        <div className="img-controls absolute bottom-2 right-2 flex space-x-1.5 z-10">
                            <button onClick={(e) => { e.stopPropagation(); copyToClipboard(img); }} className="p-1.5 bg-black/60 backdrop-blur-md text-white rounded-md hover:bg-green-500 transition-colors" title="复制链接"><Copy size={14} /></button>
                            <button onClick={(e) => { e.stopPropagation(); downloadFile(img, `img_${item.id}_${idx}.png`); }} className="p-1.5 bg-black/60 backdrop-blur-md text-white rounded-md hover:bg-blue-500 transition-colors" title="下载原图"><Download size={14} /></button>
                        </div>
                    )}
                </div>
            );

            if (total === 1) {
                return (
                    <div className="w-full h-full">
                        {renderImg(images[0], 0, "w-full min-h-[300px] max-h-[600px]")}
                    </div>
                );
            }
            if (total === 2) {
                return (
                    <div className="flex flex-col gap-3 w-full h-full">
                        {renderImg(images[0], 0, "w-full min-h-[200px] max-h-[350px]")}
                        {renderImg(images[1], 1, "w-full min-h-[200px] max-h-[350px]")}
                    </div>
                );
            }
            if (total === 3) {
                return (
                    <div className="flex flex-col gap-3 w-full h-full">
                        {renderImg(images[0], 0, "w-full min-h-[250px] max-h-[400px]")}
                        <div className="grid grid-cols-2 gap-3 w-full">
                            {renderImg(images[1], 1, "w-full min-h-[150px] max-h-[250px]")}
                            {renderImg(images[2], 2, "w-full min-h-[150px] max-h-[250px]")}
                        </div>
                    </div>
                );
            }
            if (total === 4) {
                return (
                    <div className="flex flex-col gap-3 w-full h-full">
                        {renderImg(images[0], 0, "w-full min-h-[250px] max-h-[400px]")}
                        <div className="grid grid-cols-3 gap-3 w-full">
                            {renderImg(images[1], 1, "w-full min-h-[100px] max-h-[180px]")}
                            {renderImg(images[2], 2, "w-full min-h-[100px] max-h-[180px]")}
                            {renderImg(images[3], 3, "w-full min-h-[100px] max-h-[180px]")}
                        </div>
                    </div>
                );
            }
            return (
                <div className="flex flex-col gap-3 w-full h-full">
                    {renderImg(images[0], 0, "w-full min-h-[250px] max-h-[400px]")}
                    <div className="grid grid-cols-4 gap-3 w-full">
                        {renderImg(images[1], 1, "w-full min-h-[80px] max-h-[150px]")}
                        {renderImg(images[2], 2, "w-full min-h-[80px] max-h-[150px]")}
                        {renderImg(images[3], 3, "w-full min-h-[80px] max-h-[150px]")}
                        {renderImg(images[4], 4, "w-full min-h-[80px] max-h-[150px]", total > 5 ? total - 5 : 0)}
                    </div>
                </div>
            );
        };

        const WebCardView = ({ currentData, searchTerm, onImageClick }) => {
            const [activeSection, setActiveSection] = useState('');

            const generateWebData = () => {
                const { grid, maxCol, images, links, mergeMap, shapeTexts } = currentData;
                if (!grid || grid.length <= 1) return { mainGroups: [], outerItems: [] };

                const filledGrid = grid.map(row => [...row]);
                const filledLinks = { ...links };

                // 填充合并单元格数据
                Object.keys(mergeMap).forEach(key => {
                    const [r0Str, c0Str] = key.split(',');
                    const r0 = parseInt(r0Str), c0 = parseInt(c0Str);
                    const { rowSpan, colSpan } = mergeMap[key];
                    
                    let val = "";
                    for (let r = r0; r < r0 + rowSpan; r++) {
                        for (let c = c0; c < c0 + colSpan; c++) {
                            const cVal = grid[r]?.[c];
                            if (cVal !== undefined && cVal !== null && String(cVal).trim() !== "") {
                                val = cVal;
                                break;
                            }
                        }
                        if (val !== "") break;
                    }

                    const link = links[`${r0},${c0}`];
                    
                    for (let r = r0; r < r0 + rowSpan; r++) {
                        for (let c = c0; c < c0 + colSpan; c++) {
                            if (!filledGrid[r]) filledGrid[r] = [];
                            filledGrid[r][c] = val; 
                            if (link) filledLinks[`${r},${c}`] = link;
                        }
                    }
                });

                const headers = filledGrid[0] || [];
                const rawRecords = [];

                // 移除所有自作聪明的“猜重点列”、“截断”逻辑
                // 直接平铺提取每一行作为独立卡片
                let currentCategory = '默认分类';

                for (let r = 1; r < filledGrid.length; r++) {
                    const row = filledGrid[r];
                    if (!row) continue;

                    let rowImgs = [];
                    for (let c = 0; c < maxCol; c++) {
                        if (images[`${r},${c}`]) rowImgs.push(...images[`${r},${c}`]);
                        if (isImageUrl(row[c])) rowImgs.push(row[c]);
                    }

                    const fields = [];
                    
                    // 🌟 史诗级修复：暴力全拿！不再跳过第一列，不再挑列，全部显示！
                    for (let c = 0; c < maxCol; c++) {
                        let val = row[c];
                        let strVal = val !== undefined && val !== null ? String(val) : "";
                        
                        const sTexts = shapeTexts[`${r},${c}`];
                        if (sTexts && sTexts.length > 0) {
                            const shapeStr = sTexts.join('\n');
                            strVal = strVal ? strVal + '\n' + shapeStr : shapeStr;
                        }

                        strVal = strVal.trim();

                        if (strVal !== "" && !isImageUrl(strVal)) {
                            fields.push({
                                colIndex: c,
                                colName: headers[c] || `属性列 ${c+1}`,
                                value: strVal,
                                link: filledLinks[`${r},${c}`]
                            });
                        }
                    }
                    
                    if (fields.length === 0 && rowImgs.length === 0) continue;

                    // 为了保证侧边栏目录的运转，提取第一列的内容作为大分类名称
                    // （同时这部分内容也会在上面的 fields 中正常显示，不丢字）
                    const firstColVal = row[0] !== undefined && row[0] !== null ? String(row[0]).trim() : "";
                    if (firstColVal !== "" && !isImageUrl(firstColVal)) {
                        currentCategory = firstColVal;
                    }

                    if (searchTerm) {
                        const term = searchTerm.toLowerCase();
                        const matches = fields.some(f => f.value.toLowerCase().includes(term)) || currentCategory.toLowerCase().includes(term);
                        if (!matches) continue;
                    }

                    rawRecords.push({ 
                        id: r, 
                        category: currentCategory, 
                        fields: fields, 
                        images: rowImgs 
                    });
                }

                // 移除所有的去重算法，100%忠实还原原表数据行数
                const grouped = {};
                rawRecords.forEach(rec => {
                    if (!grouped[rec.category]) grouped[rec.category] = [];
                    grouped[rec.category].push(rec);
                });

                return {
                    mainGroups: Object.entries(grouped).map(([category, items]) => ({ category, items }))
                };
            };

            const { mainGroups } = generateWebData();

            // 💡 我们精心打磨的二级智能目录
            const getCardSubTitle = (item, idx) => {
                // 如果是第一列作为了分类大标题，子标题就去猜后面的列
                const titleField = item.fields.find(f => /名|标题|品|款|title|name|product/i.test(f.colName) && f.colIndex > 0);
                if (titleField && titleField.value) return titleField.value;
                const shortField = item.fields.find(f => f.value && f.value.length < 40 && !isImageUrl(f.value) && f.colIndex > 0);
                if (shortField) return shortField.value;
                return item.fields[0]?.value || `子项 ${idx + 1}`;
            };

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setActiveSection(entry.target.id);
                        }
                    });
                }, { rootMargin: '-180px 0px -50% 0px' });

                mainGroups.forEach((group, gIdx) => {
                    const el = document.getElementById(`section-main-${gIdx}`);
                    if (el) observer.observe(el);
                    
                    group.items.forEach((_, idx) => {
                        const cardEl = document.getElementById(`card-${gIdx}-${idx}`);
                        if (cardEl) observer.observe(cardEl);
                    });
                });
                
                return () => observer.disconnect();
            }, [mainGroups.length]);

            const scrollToSection = (id) => {
                const el = document.getElementById(id);
                if (el) {
                    const y = el.getBoundingClientRect().top + window.scrollY - 160; 
                    window.scrollTo({ top: y, behavior: 'smooth' });
                    setActiveSection(id);
                }
            };

            if (mainGroups.length === 0) {
                return (
                    <div className="py-32 text-center flex flex-col items-center">
                        <div className="w-24 h-24 bg-white dark:bg-darkcard rounded-full flex items-center justify-center mb-6 shadow-sm border border-slate-100 dark:border-darkborder">
                            <Search size={36} className="text-slate-400" />
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-200 mb-2">未找到匹配数据</h2>
                        <p className="text-slate-500">尝试调整搜索关键词，或检查当前表格是否为空。</p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col md:flex-row gap-6 lg:gap-10 w-full max-w-[1600px] mx-auto items-start">
                    
                    <div className="flex-1 space-y-16 mt-4 w-full min-w-0 pb-20">
                        {currentData.images['global'] && currentData.images['global'].length > 0 && (
                            <section className="animate-in fade-in duration-500">
                                <div className="mb-4 flex items-center pl-1">
                                    <div className="w-1.5 h-6 bg-slate-400 rounded-full mr-3"></div>
                                    <h2 className="text-xl font-bold text-slate-800 dark:text-white tracking-tight">附件媒体库</h2>
                                </div>
                                <div className="flex overflow-x-auto gap-4 pb-4 scrollbar-hide">
                                    {currentData.images['global'].map((img, i) => (
                                        <div key={i} className="img-zoom-container flex-shrink-0 relative bg-white dark:bg-darkcard rounded-2xl border border-slate-200/60 dark:border-darkborder w-40 h-40 flex items-center justify-center p-2 shadow-sm group" onClick={() => onImageClick(img)}>
                                            <img src={img} className="hero-img object-contain w-full h-full" />
                                            <div className="img-controls absolute bottom-2 flex space-x-1 z-10">
                                                <button onClick={(e) => { e.stopPropagation(); downloadFile(img, `attachment_${i}.png`); }} className="p-1.5 bg-black/70 backdrop-blur text-white rounded-md hover:bg-blue-500 transition-colors" title="下载原图"><Download size={14} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {mainGroups.map((group, gIdx) => (
                            <section key={gIdx} id={`section-main-${gIdx}`} className="animate-in fade-in duration-500 scroll-mt-40" style={{animationDelay: `${gIdx * 50}ms`}}>
                                <div className="mb-4 flex items-center pl-1">
                                    <div className="w-1.5 h-6 bg-blue-600 rounded-full mr-3"></div>
                                    <h2 className="text-2xl font-bold text-slate-800 dark:text-white flex items-center tracking-tight">
                                        <span className="text-blue-600 mr-2">{gIdx + 1}.</span>
                                        {group.category}
                                    </h2>
                                </div>

                                <div className="flex flex-col gap-6 w-full">
                                    {group.items.map((item, idx) => (
                                        <div key={idx} id={`card-${gIdx}-${idx}`} className="list-card bg-white dark:bg-darkcard border border-slate-200/80 dark:border-darkborder rounded-2xl overflow-hidden flex flex-col lg:flex-row shadow-sm scroll-mt-40 relative group/outer">
                                            <div className="absolute top-4 left-0 w-1.5 h-5 bg-blue-400 rounded-r-md opacity-0 transition-opacity"></div>
                                            
                                            {item.images.length > 0 && (
                                                <div className="relative w-full lg:w-[320px] xl:w-[400px] flex-shrink-0 bg-[#f8fafc] dark:bg-[#0b101e] border-b lg:border-b-0 lg:border-r border-slate-100 dark:border-darkborder p-5 flex flex-col">
                                                    <ImageGallery images={item.images} item={item} onImageClick={onImageClick} />
                                                </div>
                                            )}
                                            <div className="p-6 lg:p-8 flex-1 w-full overflow-hidden">
                                                <div className="flex flex-col gap-6 w-full">
                                                    {item.fields.map((field, fIdx) => (
                                                        <FieldBlock key={fIdx} field={field} />
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ))}
                    </div>

                    {mainGroups.length > 0 && (
                        <div className="hidden md:block w-48 lg:w-64 shrink-0 sticky top-[160px] self-start max-h-[calc(100vh-180px)] overflow-y-auto custom-scrollbar animate-in fade-in duration-500 pr-2">
                            <div className="bg-white/60 dark:bg-darkcard/60 backdrop-blur-xl border border-slate-200/80 dark:border-darkborder rounded-2xl p-4 lg:p-5 shadow-sm">
                                <h3 className="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-4 flex justify-between items-center">
                                    <span>导航目录</span>
                                    <span className="bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 px-2 py-0.5 rounded-full text-[10px]">
                                        共 {mainGroups.length} 个大类
                                    </span>
                                </h3>
                                <ul className="space-y-3 border-l-2 border-slate-100 dark:border-darkborder ml-1">
                                    {mainGroups.map((group, gIdx) => {
                                        const groupId = `section-main-${gIdx}`;
                                        const isGroupActive = activeSection === groupId || activeSection.startsWith(`card-${gIdx}-`);
                                        
                                        return (
                                            <li key={gIdx}>
                                                <button
                                                    onClick={() => scrollToSection(groupId)}
                                                    className={`w-full text-left pl-4 text-[13px] transition-all relative group/nav ${isGroupActive ? 'text-blue-600 font-bold dark:text-blue-400' : 'text-slate-600 font-semibold hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'}`}
                                                >
                                                    {isGroupActive && <div className="absolute left-[-2px] top-0 bottom-0 w-0.5 bg-blue-600 rounded-r-full"></div>}
                                                    <div className="truncate pr-2" title={group.category}>{gIdx + 1}. {group.category}</div>
                                                </button>
                                                
                                                <ul className="mt-1.5 space-y-1 pl-3 border-l-[1.5px] border-slate-100/50 dark:border-white/5 ml-4">
                                                    {group.items.map((item, idx) => {
                                                        const cardId = `card-${gIdx}-${idx}`;
                                                        const isCardActive = activeSection === cardId;
                                                        
                                                        const rawSub = getCardSubTitle(item, idx);
                                                        const displayTitle = rawSub.split('\n')[0].substring(0, 16) + (rawSub.length > 16 ? '...' : '');
                                                        
                                                        return (
                                                            <li key={idx}>
                                                                <button
                                                                    onClick={() => scrollToSection(cardId)}
                                                                    className={`w-full text-left pl-3 py-1 text-xs transition-all relative ${isCardActive ? 'text-blue-500 font-bold' : 'text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'}`}
                                                                    title={rawSub}
                                                                >
                                                                    {isCardActive && <div className="absolute left-[-1.5px] top-[4px] bottom-[4px] w-0.5 bg-blue-400 rounded-r-full"></div>}
                                                                    <div className="truncate">- {displayTitle}</div>
                                                                </button>
                                                            </li>
                                                        );
                                                    })}
                                                </ul>
                                            </li>
                                        );
                                    })}
                                </ul>
                            </div>
                        </div>
                    )}
                    
                </div>
            );
        };

        function App() {
            const [workbookData, setWorkbookData] = useState(null); 
            const [activeTab, setActiveTab] = useState(''); 
            const [searchTerm, setSearchTerm] = useState(''); 
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [progress, setProgress] = useState({ percent: 0, text: '' });
            
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [previewImage, setPreviewImage] = useState(null); 
            const [showHiddenSheets, setShowHiddenSheets] = useState(false);
            const [isDragging, setIsDragging] = useState(false);
            const [showTopBtn, setShowTopBtn] = useState(false);
            
            const [showSheetMenu, setShowSheetMenu] = useState(false);
            const menuRef = useRef(null);
            
            const hasHiddenSheetsVal = workbookData ? Object.keys(workbookData).some(name => workbookData[name].isHidden) : false;

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (menuRef.current && !menuRef.current.contains(event.target)) setShowSheetMenu(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const toggleSheetVisibility = (sheetName) => {
                setWorkbookData(prev => {
                    const newData = { ...prev };
                    const willBeHidden = !newData[sheetName].isHidden;
                    newData[sheetName] = { ...newData[sheetName], isHidden: willBeHidden };
                    if (willBeHidden && activeTab === sheetName && !showHiddenSheets) {
                        const nextVisible = Object.keys(newData).find(name => !newData[name].isHidden);
                        if (nextVisible) setActiveTab(nextVisible);
                    }
                    return newData;
                });
            };

            const showAllSheets = () => {
                setWorkbookData(prev => {
                    const newData = { ...prev };
                    Object.keys(newData).forEach(k => newData[k].isHidden = false);
                    return newData;
                });
            };

            const invertSheetSelection = () => {
                setWorkbookData(prev => {
                    const newData = { ...prev };
                    Object.keys(newData).forEach(k => newData[k].isHidden = !newData[k].isHidden);
                    if (newData[activeTab]?.isHidden && !showHiddenSheets) {
                        const nextVisible = Object.keys(newData).find(name => !newData[name].isHidden);
                        if (nextVisible) setActiveTab(nextVisible);
                    }
                    return newData;
                });
            };

            useEffect(() => {
                const handleScroll = () => setShowTopBtn(window.scrollY > 300);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themeMode') || 'light';
                setIsDarkMode(savedTheme === 'dark');
                if (savedTheme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, []);

            const toggleTheme = () => {
                const nextMode = isDarkMode ? 'light' : 'dark';
                setIsDarkMode(!isDarkMode);
                if (nextMode === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('themeMode', nextMode);
            };

            const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

            const processFile = async (file) => {
                if (!file) return;
                if (!/\.(xlsx|xls|csv)$/i.test(file.name)) { setError('仅支持 Excel 或 CSV 文件。'); return; }
                
                setIsLoading(true); setError('');
                setProgress({ percent: 10, text: '正在读取文件...' });

                const reader = new FileReader();
                reader.onprogress = (e) => { if (e.lengthComputable) setProgress({ percent: Math.round((e.loaded/e.total)*30), text: '加载数据块...' }); };
                
                reader.onload = async (e) => {
                    setProgress({ percent: 30, text: '解析多媒体内容...' });
                    const arrayBuffer = e.target.result;
                    let imageMap = {};
                    let shapeTextMap = {};
                    
                    if (file.name.toLowerCase().endsWith('.xlsx')) {
                        try {
                            const zip = await window.JSZip.loadAsync(arrayBuffer);
                            const mediaFiles = {};
                            
                            for (const path in zip.files) {
                                if (path.startsWith('xl/media/')) {
                                    const ext = path.split('.').pop().toLowerCase();
                                    const mime = ext === 'png' ? 'image/png' : ext === 'jpeg' || ext === 'jpg' ? 'image/jpeg' : ext === 'gif' ? 'image/gif' : 'image/png';
                                    mediaFiles[path] = `data:${mime};base64,${await zip.files[path].async('base64')}`;
                                }
                            }
                            
                            setProgress({ percent: 50, text: '校准结构...' });

                            const workbookXml = await zip.file('xl/workbook.xml').async('string');
                            const sheetMetaMap = {};
                            let match;
                            const sheetRegex = /<sheet [^>]*name="([^"]+)"[^>]*r:id="([^"]+)"/gi;
                            while ((match = sheetRegex.exec(workbookXml)) !== null) {
                                sheetMetaMap[match[2]] = { name: match[1].replace(/&amp;/g, '&') };
                            }

                            const wbRelsXml = await zip.file('xl/_rels/workbook.xml.rels').async('string');
                            const relRegex = /<Relationship [^>]*Id="([^"]+)"[^>]*Target="([^"]+)"/gi;
                            while ((match = relRegex.exec(wbRelsXml)) !== null) {
                                if (sheetMetaMap[match[1]]) {
                                    let target = match[2];
                                    target = target.replace(/^(\/?xl\/)?/, 'xl/'); 
                                    sheetMetaMap[match[1]].path = target;
                                }
                            }

                            for (const rId in sheetMetaMap) {
                                const sheet = sheetMetaMap[rId];
                                if (!sheet.path || !zip.file(sheet.path)) continue;
                                imageMap[sheet.name] = { 'global': [] };
                                shapeTextMap[sheet.name] = {};
                                
                                const sheetXml = await zip.file(sheet.path).async('string');
                                const drawingMatch = /<drawing r:id="([^"]+)"/i.exec(sheetXml);
                                
                                if (drawingMatch) {
                                    const dRId = drawingMatch[1];
                                    const sheetRelsPath = sheet.path.replace('worksheets/sheet', 'worksheets/_rels/sheet') + '.rels';
                                    if (!zip.file(sheetRelsPath)) continue;
                                    
                                    const dRelMatch = new RegExp(`<Relationship [^>]*Id="${dRId}"[^>]*Target="([^"]+)"`, 'i').exec(await zip.file(sheetRelsPath).async('string'));
                                    if (dRelMatch) {
                                        const drawingPath = 'xl/' + dRelMatch[1].replace(/^(\.\.\/)+/, '');
                                        if (!zip.file(drawingPath)) continue;
                                        
                                        const drawingXml = await zip.file(drawingPath).async('string');
                                        const drawingRelsPath = drawingPath.replace('drawings/drawing', 'drawings/_rels/drawing') + '.rels';
                                        
                                        const imgRelMap = {};
                                        if (zip.file(drawingRelsPath)) {
                                            const iRelRegex = /<Relationship [^>]*Id="([^"]+)"[^>]*Target="([^"]+)"/gi;
                                            let iMatch;
                                            const drawingRelsXml = await zip.file(drawingRelsPath).async('string');
                                            while ((iMatch = iRelRegex.exec(drawingRelsXml)) !== null) imgRelMap[iMatch[1]] = 'xl/' + iMatch[2].replace(/^(\.\.\/)+/, '');
                                        }

                                        const anchors = drawingXml.split(/<[^>]*:?(twoCellAnchor|oneCellAnchor|absoluteAnchor)/i);
                                        for (let i = 1; i < anchors.length; i++) {
                                            const anchor = anchors[i];
                                            if (!anchor || anchor === 'twoCellAnchor' || anchor === 'oneCellAnchor' || anchor === 'absoluteAnchor') continue;

                                            const colMatch = /<[^>]*col>(\d+)<\//i.exec(anchor);
                                            const rowMatch = /<[^>]*row>(\d+)<\//i.exec(anchor);
                                            
                                            const tRegex = /<a:t>([\s\S]*?)<\/a:t>/gi;
                                            let tMatch;
                                            let shapeTextParts = [];
                                            while ((tMatch = tRegex.exec(anchor)) !== null) {
                                                shapeTextParts.push(tMatch[1]);
                                            }
                                            if (shapeTextParts.length > 0 && colMatch && rowMatch) {
                                                const shapeText = shapeTextParts.join('\n').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').trim();
                                                if (shapeText) {
                                                    const key = `${rowMatch[1]},${colMatch[1]}`;
                                                    if (!shapeTextMap[sheet.name][key]) shapeTextMap[sheet.name][key] = [];
                                                    shapeTextMap[sheet.name][key].push(shapeText);
                                                }
                                            }

                                            const blipMatch = /embed="([^"]+)"/i.exec(anchor);
                                            if (blipMatch && imgRelMap[blipMatch[1]] && mediaFiles[imgRelMap[blipMatch[1]]]) {
                                                const base64Str = mediaFiles[imgRelMap[blipMatch[1]]];
                                                if (colMatch && rowMatch) {
                                                    const key = `${rowMatch[1]},${colMatch[1]}`;
                                                    if (!imageMap[sheet.name][key]) imageMap[sheet.name][key] = [];
                                                    imageMap[sheet.name][key].push(base64Str);
                                                } else {
                                                    imageMap[sheet.name]['global'].push(base64Str);
                                                }
                                            }
                                        }
                                        if (Object.keys(imageMap[sheet.name]).length === 1 && imageMap[sheet.name]['global'].length === 0) {
                                            Object.values(imgRelMap).forEach(path => {
                                                if(mediaFiles[path]) imageMap[sheet.name]['global'].push(mediaFiles[path]);
                                            });
                                        }
                                    }
                                }
                            }
                        } catch (e) { console.warn("高级多媒体提取引擎受阻:", e); }
                    }

                    setProgress({ percent: 75, text: '启动高精度网格解析器...' });

                    setTimeout(() => {
                        try {
                            const workbook = window.XLSX.read(new Uint8Array(arrayBuffer), { type: 'array', cellStyles: true });
                            const parsedData = {};
                            let firstVisibleSheet = '';
                            let containsHidden = false;

                            workbook.SheetNames.forEach((sheetName, index) => {
                                try {
                                    const isHidden = workbook.Workbook?.Sheets?.[index]?.Hidden; 
                                    if (isHidden) containsHidden = true;
                                    const displaySheetName = (file.name.toLowerCase().endsWith('.csv') && index === 0) ? file.name.replace(/\.[^/.]+$/, "") : sheetName;
                                    if (!isHidden && !firstVisibleSheet) firstVisibleSheet = displaySheetName;

                                    const worksheet = workbook.Sheets[sheetName];
                                    if (!worksheet) return;

                                    // 🌟 核心：手动 2D 提取，并应用 getCellText 强解 XML 富文本
                                    let maxR = 0, maxC = 0;
                                    for (const key in worksheet) {
                                        if (!key || key[0] === '!') continue;
                                        try {
                                            const addr = window.XLSX.utils.decode_cell(key);
                                            if (addr.r > maxR) maxR = addr.r;
                                            if (addr.c > maxC) maxC = addr.c;
                                        } catch (e) {}
                                    }

                                    const rawGrid = [];
                                    const links = {};
                                    
                                    for (let r = 0; r <= maxR; r++) {
                                        let rowData = [];
                                        for (let c = 0; c <= maxC; c++) {
                                            const cellAddr = window.XLSX.utils.encode_cell({r, c});
                                            const cell = worksheet[cellAddr];
                                            let val = "";
                                            
                                            if (cell) {
                                                val = getCellText(cell);

                                                if (cell.l && cell.l.Target) {
                                                    links[`${r},${c}`] = cell.l.Target;
                                                }
                                            }
                                            rowData.push(val);
                                        }
                                        rawGrid.push(rowData);
                                    }

                                    const mergeMap = {}; 
                                    if (worksheet['!merges']) {
                                        worksheet['!merges'].forEach(m => {
                                            if (!m || !m.s || !m.e) return;
                                            mergeMap[`${m.s.r},${m.s.c}`] = { rowSpan: m.e.r - m.s.r + 1, colSpan: m.e.c - m.s.c + 1 };
                                        });
                                    }

                                    let maxCol = 0; rawGrid.forEach(row => { if (row && row.length > maxCol) maxCol = row.length; });
                                    
                                    while (maxCol > 0) {
                                        let hasData = false;
                                        for (let r = 0; r < rawGrid.length; r++) {
                                            const cellVal = rawGrid[r] && rawGrid[r][maxCol - 1];
                                            if (cellVal !== undefined && cellVal !== null && String(cellVal).trim() !== "") {
                                                hasData = true; break;
                                            }
                                            if (imageMap[sheetName] && imageMap[sheetName][`${r},${maxCol - 1}`]) {
                                                hasData = true; break;
                                            }
                                        }
                                        if (hasData) break;
                                        maxCol--;
                                    }

                                    const cleanGrid = rawGrid.map(row => {
                                        const safeRow = Array(maxCol).fill("");
                                        if (row) {
                                            for (let i = 0; i < Math.min(row.length, maxCol); i++) {
                                                const v = row[i];
                                                safeRow[i] = v !== undefined && v !== null ? String(v) : "";
                                            }
                                        }
                                        return safeRow;
                                    });

                                    parsedData[displaySheetName] = { 
                                        grid: cleanGrid, 
                                        mergeMap, 
                                        links, 
                                        images: imageMap[sheetName] || {global:[]}, 
                                        shapeTexts: shapeTextMap[sheetName] || {}, 
                                        isHidden: !!isHidden, 
                                        maxCol 
                                    };
                                } catch (sheetError) {
                                    console.error(`解析工作表跳过:`, sheetError);
                                }
                            });

                            if (Object.keys(parsedData).length === 0) {
                                throw new Error("未能成功解析出任何有效的工作表数据。");
                            }

                            setProgress({ percent: 100, text: '全量解析完毕!' });
                            setTimeout(() => {
                                setWorkbookData(parsedData);
                                setActiveTab(firstVisibleSheet || workbook.SheetNames[0]);
                                setShowHiddenSheets(!firstVisibleSheet);
                                setIsLoading(false);
                                window.scrollTo(0, 0); 
                            }, 300);
                        } catch (err) { 
                            setError(`数据构建失败: ${err.message || '文件底层结构异常'}`); 
                            setIsLoading(false); 
                        }
                    }, 50);
                };
                reader.onerror = () => { setError('读取文件受阻。'); setIsLoading(false); };
                reader.readAsArrayBuffer(file);
            };

            const clearData = () => { setWorkbookData(null); setActiveTab(''); setSearchTerm(''); setShowHiddenSheets(false); setShowSheetMenu(false); setPreviewImage(null); };

            const FullscreenImageModal = () => {
                if (!previewImage) return null;
                return (
                    <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md animate-in fade-in" onClick={() => setPreviewImage(null)}>
                        <img src={previewImage} className="max-w-[95vw] max-h-[90vh] object-contain drop-shadow-2xl rounded-lg" onClick={e => e.stopPropagation()} />
                        <button className="absolute top-6 right-6 text-white bg-white/10 hover:bg-white/20 p-2.5 rounded-full backdrop-blur-md transition-colors" onClick={() => setPreviewImage(null)} title="关闭预览">
                            <X size={24} />
                        </button>
                    </div>
                );
            };

            const SupportModal = () => {
                if (!showModal) return null;
                return (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 dark:bg-black/80 backdrop-blur-md animate-in fade-in">
                        <div className="bg-white dark:bg-darkcard w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-darkborder">
                            <div className="flex justify-between items-center p-6 border-b border-slate-100 dark:border-darkborder">
                                <h3 className="text-xl font-bold flex items-center text-slate-800 dark:text-white"><Heart size={20} className="text-rose-500 mr-2" />支持作者</h3>
                                <button onClick={() => setShowModal(false)} className="text-slate-400 hover:text-slate-900 dark:hover:text-white p-1.5 rounded-full bg-slate-100 dark:bg-darkborder transition-colors"><X size={20} /></button>
                            </div>
                            <div className="p-6 space-y-6">
                                <p className="text-sm text-center text-slate-500 dark:text-slate-400">如果您喜欢这款工具，欢迎给予我一点支持！</p>
                                <div className="flex justify-center space-x-6">
                                    <div className="flex flex-col items-center">
                                        <div className="w-32 h-32 bg-slate-50 dark:bg-darkbg rounded-2xl mb-2 overflow-hidden border border-slate-200 dark:border-darkborder p-1">
                                            <img src={MY_CONFIG.wechatQR} className="w-full h-full object-cover rounded-xl" onError={(e)=>{e.target.style.display='none'; e.target.nextSibling.style.display='block';}}/>
                                            <span style={{display:'none'}} className="text-xs text-slate-400 absolute mt-14 ml-4">未配置微信码</span>
                                        </div>
                                        <span className="text-xs font-bold text-green-600">微信支付</span>
                                    </div>
                                    <div className="flex flex-col items-center">
                                        <div className="w-32 h-32 bg-slate-50 dark:bg-darkbg rounded-2xl mb-2 overflow-hidden border border-slate-200 dark:border-darkborder p-1">
                                            <img src={MY_CONFIG.alipayQR} className="w-full h-full object-cover rounded-xl" onError={(e)=>{e.target.style.display='none'; e.target.nextSibling.style.display='block';}}/>
                                            <span style={{display:'none'}} className="text-xs text-slate-400 absolute mt-14 ml-4">未配置支付宝</span>
                                        </div>
                                        <span className="text-xs font-bold text-blue-600">支付宝</span>
                                    </div>
                                </div>
                                <div className="bg-slate-50 dark:bg-darkbg rounded-xl p-4 space-y-3 border border-slate-100 dark:border-darkborder">
                                    <div className="flex items-center text-sm"><MessageCircle size={16} className="text-slate-400 mr-2"/><span className="text-slate-500 w-10">微信</span><span className="font-mono select-all font-bold text-slate-700 dark:text-slate-200">{MY_CONFIG.wechatId}</span></div>
                                    <div className="flex items-center text-sm"><Mail size={16} className="text-slate-400 mr-2"/><span className="text-slate-500 w-10">邮箱</span><a href={`mailto:${MY_CONFIG.email}`} className="text-blue-600 font-bold hover:underline">{MY_CONFIG.email}</a></div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const AppHeader = ({ showTools }) => (
                <header className="sticky top-0 z-50 bg-white/80 dark:bg-darkbg/80 backdrop-blur-2xl border-b border-slate-200/60 dark:border-darkborder h-[64px]">
                    <div className="max-w-[100%] w-full px-6 md:px-12 h-full flex justify-between items-center mx-auto">
                        
                        <div className="flex items-center gap-1 md:gap-3">
                            <div className="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center shadow-md"><LayoutGrid size={16} /></div>
                            <h1 className="text-xl font-bold tracking-tight text-slate-900 dark:text-white hidden sm:block">Data<span className="font-normal opacity-60 ml-0.5">Canvas</span></h1>
                            <CurrencyCopier />
                        </div>

                        {showTools && (
                            <div className="flex items-center gap-3 md:gap-5">
                                <div className="relative" ref={menuRef}>
                                    <button 
                                        onClick={() => setShowSheetMenu(!showSheetMenu)}
                                        className="flex items-center gap-1.5 px-4 py-1.5 bg-slate-100/80 dark:bg-white/5 border border-slate-200/50 dark:border-white/5 rounded-full text-xs font-bold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors shadow-sm"
                                        title="管理与筛选工作表"
                                    >
                                        <Layers size={14} />
                                        <span className="hidden sm:inline">工作表筛选</span>
                                    </button>
                                    
                                    {showSheetMenu && (
                                        <div className="absolute top-full mt-3 right-0 w-60 bg-white/95 dark:bg-darkcard/95 backdrop-blur-xl border border-slate-200/80 dark:border-darkborder shadow-xl rounded-xl p-2 z-50 animate-in fade-in slide-in-from-top-2 duration-200">
                                            <div className="px-2 py-1.5 text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2 flex justify-between items-center border-b border-slate-100 dark:border-white/10 pb-2.5">
                                                <span>工作表显示</span>
                                                <div className="flex gap-2.5">
                                                    <button onClick={showAllSheets} className="hover:text-blue-500 text-slate-500 transition-colors">全显</button>
                                                    <button onClick={invertSheetSelection} className="hover:text-blue-500 text-slate-500 transition-colors">反选</button>
                                                </div>
                                            </div>
                                            <div className="max-h-[40vh] overflow-y-auto custom-scrollbar flex flex-col gap-1">
                                                {Object.keys(workbookData).map(sheetName => {
                                                    const isHidden = workbookData[sheetName].isHidden;
                                                    return (
                                                        <button
                                                            key={sheetName}
                                                            onClick={() => toggleSheetVisibility(sheetName)}
                                                            className="w-full flex items-center justify-between px-2.5 py-2 text-sm rounded-lg hover:bg-slate-100 dark:hover:bg-white/10 transition-colors text-left group"
                                                        >
                                                            <span className={`truncate pr-2 transition-colors ${isHidden ? 'text-slate-400 dark:text-slate-500' : 'text-slate-700 dark:text-slate-200 font-semibold group-hover:text-blue-600 dark:group-hover:text-blue-400'}`}>
                                                                {sheetName}
                                                            </span>
                                                            {isHidden ? <EyeOff size={15} className="text-slate-300 dark:text-slate-600 flex-shrink-0" /> : <Eye size={15} className="text-blue-500 flex-shrink-0" />}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="w-px h-4 bg-slate-200 dark:bg-slate-700 hidden sm:block"></div>

                                <a href="https://github.com/Zhai-XiaoQi/DataCanvas" target="_blank" rel="noreferrer" className="flex items-center gap-1 text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors" title="访问 GitHub 源码">
                                    <Github size={18} />
                                    <span className="hidden sm:inline text-xs font-bold mt-[1px]">GitHub</span>
                                </a>
                                
                                <button onClick={toggleTheme} className="text-slate-400 hover:text-blue-500 transition-colors" title="深浅色切换">{isDarkMode ? <Sun size={18} /> : <Moon size={18} />}</button>
                                <button onClick={() => setShowModal(true)} className="text-slate-400 hover:text-rose-500 transition-colors" title="关于与支持"><Heart size={18} /></button>
                                <button onClick={clearData} className="text-slate-400 hover:text-red-500 transition-colors" title="清除并重新导入"><Trash2 size={18} /></button>
                            </div>
                        )}
                    </div>
                </header>
            );

            if (!workbookData) {
                return (
                <div className="min-h-screen flex flex-col">
                    <AppHeader showTools={false} />
                    <div className="flex-1 flex items-center justify-center p-6">
                        <div className="max-w-2xl w-full">
                            <div className="text-center mb-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                <h2 className="text-4xl md:text-5xl font-bold tracking-tight mb-4 text-slate-900 dark:text-white leading-tight">干净、结构化的数据呈现。</h2>
                                <p className="text-lg text-slate-500 dark:text-slate-400">将复杂的 Excel 瞬间转化为排版严谨、一目了然的现代化网页。</p>
                            </div>
                            
                            <div onDragOver={e=>{e.preventDefault(); setIsDragging(true);}} onDragLeave={e=>{e.preventDefault(); setIsDragging(false);}} onDrop={e=>{e.preventDefault(); setIsDragging(false); if(e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);}}
                                className={`border border-dashed rounded-3xl p-12 text-center transition-all bg-white dark:bg-darkcard flex flex-col items-center justify-center min-h-[300px] 
                                    ${isDragging ? 'border-blue-500 scale-[1.02] shadow-xl ring-4 ring-blue-500/10' : 'border-slate-300 dark:border-darkborder shadow-sm hover:shadow-md'}`}
                            >
                                <input type="file" accept=".xlsx,.xls,.csv" onChange={e => {if(e.target.files.length) processFile(e.target.files[0])}} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                {!isLoading ? (
                                    <>
                                        <div className="w-16 h-16 bg-blue-50 dark:bg-blue-900/20 rounded-2xl flex items-center justify-center mb-5"><UploadCloud size={32} className="text-blue-500" /></div>
                                        <p className="text-lg font-bold text-slate-800 dark:text-white mb-2">点击或拖拽文件至此</p>
                                        <p className="text-sm text-slate-500">支持解析富文本层级、图片、及合并单元格</p>
                                    </>
                                ) : (
                                    <div className="w-full max-w-sm">
                                        <div className="flex justify-between text-sm mb-3 font-semibold text-slate-600 dark:text-slate-300"><span>{progress.text}</span><span className="text-blue-600">{progress.percent}%</span></div>
                                        <div className="w-full bg-slate-100 dark:bg-darkbg rounded-full h-2 overflow-hidden"><div className="bg-blue-600 h-2 rounded-full transition-all duration-300" style={{width: `${progress.percent}%`}}></div></div>
                                    </div>
                                )}
                            </div>
                            {error && <div className="mt-6 p-4 bg-red-50 dark:bg-red-900/10 text-red-600 dark:text-red-400 rounded-2xl text-sm text-center border border-red-100 dark:border-red-900/20 font-medium shadow-sm">{error}</div>}
                        </div>
                    </div>
                </div>
                );
            }

            const currentData = workbookData[activeTab];
            const visibleTabs = showHiddenSheets ? Object.keys(workbookData) : Object.keys(workbookData).filter(name => !workbookData[name].isHidden);

            return (
                <div className="min-h-screen flex flex-col relative">
                    <AppHeader showTools={true} />

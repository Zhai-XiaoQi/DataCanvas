                    <div className="sticky top-[64px] z-40 bg-[#f8fafc]/95 dark:bg-darkbg/95 backdrop-blur-xl border-b border-slate-200/60 dark:border-darkborder pt-4 pb-0">
                        <div className="max-w-[100%] w-full px-6 md:px-12 mx-auto flex flex-col md:flex-row md:items-end justify-between gap-4">
                            
                            <div className="flex overflow-x-auto scrollbar-hide gap-6 pb-4 flex-1 w-full">
                                {visibleTabs.map(sheet => (
                                    <button key={sheet} onClick={() => { 
                                        setActiveTab(sheet); 
                                        setSearchTerm(''); 
                                        window.scrollTo(0, 0); 
                                    }}
                                        className={`whitespace-nowrap text-sm font-semibold transition-all relative pb-2 px-1
                                            ${activeTab === sheet ? 'text-slate-900 dark:text-white' : 'text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}
                                    >
                                        {workbookData[sheet].isHidden && <EyeOff size={14} className="inline mr-1 opacity-50 relative -top-0.5" />}
                                        {sheet}
                                        {activeTab === sheet && <div className="absolute -bottom-[1px] left-0 right-0 h-0.5 bg-blue-600 rounded-t-full"></div>}
                                    </button>
                                ))}
                            </div>

                            <div className="flex items-center gap-4 pb-4 w-full md:w-auto">
                                {hasHiddenSheetsVal && (
                                    <label className="flex items-center cursor-pointer text-xs font-semibold text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors bg-white dark:bg-darkcard px-2.5 py-1.5 rounded-lg border border-slate-200 dark:border-darkborder shadow-sm">
                                        <input type="checkbox" className="mr-1.5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-3.5 h-3.5" checked={showHiddenSheets} onChange={() => setShowHiddenSheets(!showHiddenSheets)} />
                                        查阅隐藏表
                                    </label>
                                )}
                                <div className="relative w-full md:w-64">
                                    <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" placeholder="键入文本局部筛选..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full pl-9 pr-4 py-2 bg-white dark:bg-darkcard border border-slate-200 dark:border-darkborder rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 transition-shadow shadow-sm" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <main className="w-full px-6 md:px-12 py-8 flex-1 relative z-10">
                        <WebCardView currentData={currentData} searchTerm={searchTerm} onImageClick={setPreviewImage} />
                    </main>
                    
                    <footer className="py-8 text-center text-xs text-slate-400 border-t border-slate-200/60 dark:border-darkborder">
                        Designed by {MY_CONFIG.authorName}
                    </footer>
                    
                    {showTopBtn && (
                        <button onClick={scrollToTop} className="fixed bottom-10 right-10 z-50 p-3.5 bg-blue-600 text-white rounded-full shadow-xl shadow-blue-500/30 hover:-translate-y-1.5 transition-all border border-blue-500 flex items-center justify-center">
                            <ArrowUp size={24} />
                        </button>
                    )}
                    
                    <SupportModal />
                    <FullscreenImageModal />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
